name: Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Clojure
        uses: DeLaGuardo/setup-clojure@12.5
        with:
          cli: latest
          bb: latest
          clj-kondo: latest

      - name: Install npm dependencies
        run: npm install

      - name: Quality gate (lint + compile check)
        run: bb check

      - name: Lint JavaScript/TypeScript
        run: npm run lint:js

      - name: Check FR coverage
        run: bb lint:fr-tests -- --strict

      - name: Verify scenario coverage
        run: bb lint:scenarios

      - name: Verify documentation references
        run: bb docs:verify

      - name: Run tests
        run: bb test
