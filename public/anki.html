<!doctype html>
<html>
<head>
    <meta charset="utf-8"/>
    <title>Local-First Anki</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
        }

        .anki-app {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 20px;
        }

        nav {
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        nav h1 {
            margin: 0 0 10px 0;
            color: #333;
        }

        nav p {
            margin: 0;
            color: #666;
            font-size: 14px;
        }

        .setup-screen {
            text-align: center;
            padding: 40px 20px;
        }

        .setup-screen h1 {
            color: #333;
            margin-bottom: 20px;
        }

        .setup-screen p {
            color: #666;
            margin-bottom: 30px;
        }

        .review-screen {
            padding: 20px;
        }

        .review-header {
            margin-bottom: 20px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 4px;
            text-align: center;
        }

        .review-content {
            margin: 20px 0;
        }

        .review-card {
            padding: 30px;
            background: #fff;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            min-height: 200px;
        }

        .question, .answer, .cloze-text {
            margin: 20px 0;
        }

        .question h2, .answer h2 {
            color: #555;
            font-size: 16px;
            margin-bottom: 10px;
        }

        .question p, .answer p, .cloze-text p {
            font-size: 20px;
            line-height: 1.6;
            color: #333;
        }

        .rating-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 30px;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
        }

        .rating-buttons button:nth-child(1) { /* Forgot */
            background: #ef5350;
            color: white;
        }

        .rating-buttons button:nth-child(2) { /* Hard */
            background: #ffa726;
            color: white;
        }

        .rating-buttons button:nth-child(3) { /* Good */
            background: #66bb6a;
            color: white;
        }

        .rating-buttons button:nth-child(4) { /* Easy */
            background: #42a5f5;
            color: white;
        }

        .setup-screen button {
            background: #42a5f5;
            color: white;
            padding: 15px 30px;
            font-size: 18px;
        }

        .review-screen > div:not(.review-content) button {
            background: #42a5f5;
            color: white;
        }

        /* Review History */
        .review-history {
            margin-top: 40px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .review-history h3 {
            margin: 0 0 20px 0;
            color: #555;
            font-size: 18px;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: white;
            border-radius: 6px;
            border-left: 4px solid #ddd;
        }

        .history-card {
            display: flex;
            gap: 12px;
            align-items: center;
            flex: 1;
        }

        .card-preview {
            color: #333;
            font-size: 14px;
            flex: 1;
        }

        .rating {
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 500;
            min-width: 60px;
            text-align: center;
        }

        .rating-forgot {
            background: #ffebee;
            color: #c62828;
            border: 1px solid #ef9a9a;
        }

        .rating-hard {
            background: #fff3e0;
            color: #e65100;
            border: 1px solid #ffcc80;
        }

        .rating-good {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #a5d6a7;
        }

        .rating-easy {
            background: #e3f2fd;
            color: #1565c0;
            border: 1px solid #90caf9;
        }

        .history-time {
            color: #999;
            font-size: 13px;
            white-space: nowrap;
        }

        /* Image Occlusion */
        .image-occlusion-item canvas {
            display: block;
            margin: 20px auto;
            border: 2px solid #e0e0e0;
            border-radius: 4px;
            max-width: 100%;
            height: auto;
        }

        .image-occlusion-item h2 {
            color: #555;
            font-size: 18px;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
<div id="root"></div>
<script src="/js/anki/main.js"></script>
</body>
</html>
