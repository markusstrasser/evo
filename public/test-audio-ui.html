<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Audio Test</title>
    <style>
        body { margin: 0; padding: 20px; background: #111; color: white; font-family: monospace; }
        .test { margin: 10px 0; padding: 10px; background: #222; }
        .pass { color: #0f0; }
        .fail { color: #f00; }
    </style>
</head>
<body>
    <h1>Audio Package Test</h1>
    <div id="tests"></div>
    <script src="/js/app/main.js"></script>
    <script>
        setTimeout(() => {
            const tests = [];
            const log = (msg, pass) => {
                const div = document.createElement('div');
                div.className = 'test ' + (pass ? 'pass' : 'fail');
                div.textContent = (pass ? '✓ ' : '✗ ') + msg;
                document.getElementById('tests').appendChild(div);
            };

            // Test 1: Namespaces loaded
            try {
                const audioCore = goog.getObjectByName('audio.core');
                log('audio.core namespace loaded', !!audioCore);
            } catch(e) {
                log('audio.core namespace loaded: ' + e.message, false);
            }

            // Test 2: Test data available
            try {
                const testData = goog.getObjectByName('audio.test_data');
                log('audio.test_data namespace loaded', !!testData);
            } catch(e) {
                log('audio.test_data namespace loaded: ' + e.message, false);
            }

            // Test 3: Generate test chord
            try {
                const makeTestData = goog.getObjectByName('audio.test_data.make_test_data');
                const cMajor = makeTestData(new cljs.core.Keyword(null, 'c-major', 'c-major'));
                log('Generated C major test data: ' + cljs.core.count(cMajor) + ' bins', cljs.core.count(cMajor) === 500);
            } catch(e) {
                log('Generate test data: ' + e.message, false);
            }

            // Test 4: Pitch detection
            try {
                const findPoly = goog.getObjectByName('audio.pitch.find_polyphonic');
                const makeTestData = goog.getObjectByName('audio.test_data.make_test_data');
                const cMajor = makeTestData(new cljs.core.Keyword(null, 'c-major', 'c-major'));
                const result = findPoly(cMajor, new cljs.core.Keyword(null, 'legit-energy', 'legit-energy'), 0.2);
                const notes = cljs.core.get.call(null, result, new cljs.core.Keyword(null, 'legit-notes', 'legit-notes'));
                log('Detected notes from C major: ' + cljs.core.pr_str(notes), cljs.core.count(notes) === 3);
            } catch(e) {
                log('Pitch detection: ' + e.message, false);
            }

            // Test 5: Chord detection
            try {
                const detectChord = goog.getObjectByName('audio.pitch.detect_chord');
                const chord = detectChord(cljs.core.vector(0, 4, 7));
                const root = cljs.core.first(chord);
                const type = cljs.core.second(chord);
                log('Chord detection C-E-G: ' + root + ' ' + type, root === 0 && type === 'Major');
            } catch(e) {
                log('Chord detection: ' + e.message, false);
            }

            // Test 6: OKLCH color generation
            try {
                const midiToOklch = goog.getObjectByName('audio.utils.midi__GT_oklch');
                const color = midiToOklch(60); // C4
                log('OKLCH color for C4: ' + color, color.includes('oklch'));
            } catch(e) {
                log('OKLCH color: ' + e.message, false);
            }

        }, 1000);
    </script>
</body>
</html>
