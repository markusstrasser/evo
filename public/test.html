<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evolver UI Tests</title>
    <style>
        body {
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            margin: 0;
            padding: 20px;
            background-color: #1a1a1a;
            color: #f0f0f0;
        }
        .header {
            background: linear-gradient(45deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }
        .controls {
            margin: 20px 0;
            text-align: center;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background: #45a049;
        }
        #test-results {
            background: #2d2d2d;
            border: 1px solid #444;
            border-radius: 5px;
            padding: 20px;
            margin-top: 20px;
            max-height: 70vh;
            overflow-y: auto;
            white-space: pre-wrap;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 12px;
            line-height: 1.4;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
        }
        .status.loading {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🧪 Evolver UI Test Suite</h1>
        <p>Browser-based ClojureScript testing with AI agent integration</p>
    </div>

    <div class="controls">
        <button onclick="runAllTests()">🚀 Run All Tests</button>
        <button onclick="clearResults()">🧹 Clear Results</button>
        <button onclick="copyResults()">📋 Copy Results</button>
        <button onclick="downloadResults()">💾 Download Results</button>
    </div>

    <div id="status" class="status loading">
        ⏳ Loading test framework...
    </div>

    <div id="test-results">
        <div style="color: #888; text-align: center; padding: 40px;">
            Tests will appear here when run...
        </div>
    </div>

    <script>
        // Global functions for test control
        function runAllTests() {
            if (window.runAllTests) {
                document.getElementById('status').innerHTML = '🏃 Running tests...';
                document.getElementById('status').className = 'status loading';
                window.runAllTests();
                setTimeout(() => {
                    updateStatus();
                }, 1000);
            } else {
                alert('Test framework not loaded yet. Please wait...');
            }
        }

        function clearResults() {
            const resultsEl = document.getElementById('test-results');
            resultsEl.innerHTML = '<div style="color: #888; text-align: center; padding: 40px;">Tests cleared. Click "Run All Tests" to run again...</div>';
            document.getElementById('status').innerHTML = '🧹 Results cleared';
            document.getElementById('status').className = 'status';
        }

        function copyResults() {
            if (window.testResults) {
                navigator.clipboard.writeText(window.testResults.join('\n'));
                alert('Test results copied to clipboard!');
            } else {
                alert('No test results to copy. Run tests first.');
            }
        }

        function downloadResults() {
            if (window.testResults) {
                const blob = new Blob([window.testResults.join('\n')], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `evolver-test-results-${new Date().toISOString().slice(0,19).replace(/:/g,'-')}.txt`;
                a.click();
                URL.revokeObjectURL(url);
            } else {
                alert('No test results to download. Run tests first.');
            }
        }

        function updateStatus() {
            if (window.testResults) {
                const summary = window.getTestSummary ? window.getTestSummary() : 'Tests completed';
                const hasFailures = summary.includes('failed') && !summary.includes('0 failed');
                document.getElementById('status').innerHTML = hasFailures ? '❌ ' + summary : '✅ ' + summary;
                document.getElementById('status').className = hasFailures ? 'status error' : 'status success';
            }
        }

        // Auto-update status when tests complete
        setInterval(() => {
            if (window.testResults) {
                updateStatus();
            }
        }, 2000);

        // Expose global functions for AI agent access
        window.getTestResultsText = function() {
            return window.testResults ? window.testResults.join('\n') : 'No test results available';
        };

        window.getLastTestSummary = function() {
            return window.getTestSummary ? window.getTestSummary() : 'No summary available';
        };
    </script>

    <!-- Load the compiled test suite -->
    <script src="/ui-tests/main.js"></script>

    <script>
        // Update status when framework is loaded
        setTimeout(() => {
            if (window.runAllTests) {
                document.getElementById('status').innerHTML = '✅ Test framework loaded. Ready to run tests!';
                document.getElementById('status').className = 'status success';
            } else {
                document.getElementById('status').innerHTML = '❌ Failed to load test framework';
                document.getElementById('status').className = 'status error';
            }
        }, 2000);
    </script>
</body>
</html>
