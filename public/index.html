<!doctype html>
<html>
<head>
    <meta charset="utf-8"/>
    <title>Evolver</title>
    <style>
        .node { display: block; margin-left: 20px; padding: 2px 4px; border-left: 2px solid #ccc; }
        .selected { background-color: lightblue; border-left-color: blue; }
        .collapsed { opacity: 0.6; }
        .collapsed::before { content: "▶ "; }
        .tree { font-family: monospace; }
        .controls { margin-top: 20px; }
        .app { max-width: 800px; margin: 0 auto; padding: 20px; }

        .error-boundary { background-color: #ffebee; border: 1px solid #f44336; padding: 10px; margin: 10px 0; border-radius: 4px; }
        .error-boundary h3 { color: #c62828; margin-top: 0; }

        .log-history { margin-top: 20px; border-top: 1px solid #ccc; padding-top: 10px; }
        .log-history h3 { margin-bottom: 10px; }
        .log-entries { max-height: 200px; overflow-y: auto; }
        .log-entry { padding: 4px; margin: 2px 0; border-radius: 2px; font-family: monospace; font-size: 12px; }
        .log-entry.debug { background-color: #e3f2fd; }
        .log-entry.info { background-color: #f3e5f5; }
        .log-entry.warn { background-color: #fff3e0; }
        .log-entry.error { background-color: #ffebee; color: #c62828; }
        .log-timestamp { color: #666; margin-right: 8px; }
        .log-level { font-weight: bold; margin-right: 8px; text-transform: uppercase; }
        .log-message { flex: 1; }

        button { margin: 0 5px 5px 0; padding: 5px 10px; }
        .controls button:first-child { margin-left: 0; }
    </style>
</head>
<body>
<div id="root"></div>
<script src="/js/main.js"></script>
</body>
</html>
