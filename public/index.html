<!doctype html>
<html>
<head>
    <meta charset="utf-8"/>
    <title>Blocks UI - Architectural Demo</title>
    <link href="/styles.css" rel="stylesheet">

    <!-- MathJax Configuration -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$']],
                displayMath: [['$$', '$$']]
            },
            options: {
                skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'],
                // Match only the exact token "math" between class-list
                // separators. `\b` treats `-` as a boundary, so the old
                // `\bmath\b` pattern accidentally matches the substring
                // "math" inside "math-ignore" when the walker tests the
                // raw class string — MathJax happens to wrap this with
                // space-boundaries internally today, but don't rely on it.
                processHtmlClass: '(?:^|\\s)math(?=\\s|$)',
                // CRITICAL: Skip elements being edited (contenteditable) and
                // view-mode block containers. Without this, MathJax will
                // process raw $...$ in prose and strip delimiters.
                ignoreHtmlClass: 'math-ignore'
            }
        };
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
</head>
<body>
<div id="root"></div>

<!-- Polish A/B toggle (experimental — removes cleanly by deleting this
     button + the inline script + the html.polish-on block in styles.css).
     Applies the class synchronously before first paint to avoid FOUC. -->
<button class="polish-toggle" type="button" id="polish-toggle" aria-pressed="false">
  Polish: Off
</button>
<script>
  (function () {
    var KEY = "evo.polish";
    var root = document.documentElement;
    if (localStorage.getItem(KEY) === "on") root.classList.add("polish-on");

    function sync() {
      var btn = document.getElementById("polish-toggle");
      if (!btn) return;
      var on = root.classList.contains("polish-on");
      btn.textContent = on ? "Polish: On" : "Polish: Off";
      btn.setAttribute("aria-pressed", on ? "true" : "false");
    }

    document.addEventListener("DOMContentLoaded", function () {
      sync();
      document.getElementById("polish-toggle").addEventListener("click", function () {
        root.classList.toggle("polish-on");
        localStorage.setItem(KEY,
          root.classList.contains("polish-on") ? "on" : "off");
        sync();
      });
    });
  })();
</script>

<script src="/js/blocks-ui/main.js"></script>
</body>
</html>
