<!doctype html>
<html>
<head>
    <meta charset="utf-8"/>
    <title>Blocks UI - Architectural Demo</title>
    <link href="/styles.css" rel="stylesheet">

    <!-- MathJax Configuration -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$']],
                displayMath: [['$$', '$$']]
            },
            options: {
                skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'],
                // Match only the exact token "math" between class-list
                // separators. `\b` treats `-` as a boundary, so the old
                // `\bmath\b` pattern accidentally matches the substring
                // "math" inside "math-ignore" when the walker tests the
                // raw class string — MathJax happens to wrap this with
                // space-boundaries internally today, but don't rely on it.
                processHtmlClass: '(?:^|\\s)math(?=\\s|$)',
                // CRITICAL: Skip elements being edited (contenteditable) and
                // view-mode block containers. Without this, MathJax will
                // process raw $...$ in prose and strip delimiters.
                ignoreHtmlClass: 'math-ignore'
            }
        };
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
</head>
<body>
<div id="root"></div>

<!-- Editorial-flavor toggle (experimental) — removes cleanly by deleting
     this button + the inline script + the html.flavor-editorial block in
     styles.css. Applies the class synchronously before first paint to avoid
     a flash on reload. -->
<button class="flavor-toggle" type="button" id="flavor-toggle" aria-pressed="false">
  Refined
</button>
<script>
  (function () {
    var KEY = "evo.flavor";
    var root = document.documentElement;
    var saved = localStorage.getItem(KEY);
    if (saved === "editorial") root.classList.add("flavor-editorial");

    function sync() {
      var btn = document.getElementById("flavor-toggle");
      if (!btn) return;
      var on = root.classList.contains("flavor-editorial");
      btn.textContent = on ? "Editorial" : "Refined";
      btn.setAttribute("aria-pressed", on ? "true" : "false");
    }

    document.addEventListener("DOMContentLoaded", function () {
      sync();
      document.getElementById("flavor-toggle").addEventListener("click", function () {
        root.classList.toggle("flavor-editorial");
        localStorage.setItem(KEY,
          root.classList.contains("flavor-editorial") ? "editorial" : "refined");
        sync();
      });
    });
  })();
</script>

<script src="/js/blocks-ui/main.js"></script>
</body>
</html>
