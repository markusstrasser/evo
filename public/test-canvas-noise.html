<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <title>Canvas Noise Test</title>
</head>
<body>
    <h1>Canvas Noise Test</h1>
    <p>Testing if canvas noise generation works:</p>
    <canvas id="test-canvas"></canvas>

    <script>
        const canvas = document.getElementById('test-canvas');
        const ctx = canvas.getContext('2d');
        const w = 400;
        const h = 300;

        // Set canvas size
        canvas.width = w;
        canvas.height = h;

        // Draw noise background
        const imageData = ctx.createImageData(w, h);
        const data = imageData.data;

        for (let i = 0; i < data.length / 4; i++) {
            const val = 100 + Math.floor(Math.random() * 100);
            const idx = i * 4;
            data[idx] = val;       // R
            data[idx + 1] = val;   // G
            data[idx + 2] = val;   // B
            data[idx + 3] = 255;   // A
        }
        ctx.putImageData(imageData, 0, 0);

        // Draw green mask
        const x = 0.125 * w;
        const y = 0.167 * h;
        const rectW = 0.25 * w;
        const rectH = 0.267 * h;

        ctx.fillStyle = 'rgba(0, 255, 0, 0.45)';
        ctx.fillRect(x, y, rectW, rectH);

        console.log('Canvas rendered:', w, 'x', h);
    </script>
</body>
</html>
