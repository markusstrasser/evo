# Evo auto-overview configuration
# Used by generate-overview.sh (shared from skills/hooks/)

OVERVIEW_MODE=live
OVERVIEW_TYPES=source,tooling
OVERVIEW_MODEL=gemini-3-flash-preview
OVERVIEW_OUTPUT_DIR=.claude/overviews
OVERVIEW_PROMPT_DIR=/Users/alien/Projects/skills/hooks/overview-prompts
OVERVIEW_LOC_THRESHOLD=200
OVERVIEW_NO_GITIGNORE=true

# Source overview: ClojureScript app + scripts
OVERVIEW_SOURCE_DIRS=src/,scripts/,bb/,dev/

# Tooling overview: claude config, hooks, automation, build
OVERVIEW_TOOLING_DIRS=.claude/,scripts/,bin/

# Skip artifacts, test outputs, media, node_modules, build output
OVERVIEW_EXCLUDE=node_modules/,out/,public/js/,test-results/,test-screenshots/,playwright-report/,media/,demo-pages/,*.xml,*.backup,*.bak
